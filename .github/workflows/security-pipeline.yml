name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devsecops-app

jobs:
  # Job 1: SonarQube Code Scan
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 2: Snyk Dependency Scan
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd app && npm install
      - name: Run Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=app/package.json --severity-threshold=high

  # Job 3: Docker Build + Trivy Scan
  docker-build:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: snyk
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:latest .
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
      - name: Push to Docker Hub
        run: docker push ${{ env.DOCKER_IMAGE }}:latest

  # Job 4: Slack Notification
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: docker-build
    if: always()
    steps:
      - name: Send Slack Notification
        run: |
          STATUS="${{ needs.docker-build.result }}"
          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ DevSecOps Pipeline passed! Image pushed to Docker Hub 🚀"
          else
            MESSAGE="❌ DevSecOps Pipeline failed! Check GitHub Actions for details."
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            ${{ secrets.SLACK_WEBHOOK }}